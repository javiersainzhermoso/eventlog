<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EventLog</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>* { box-sizing: border-box; margin: 0; padding: 0; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const API_URL = "https://script.google.com/macros/s/AKfycbyMLKrGyZnmx3StAs92BbuS2LwiGJOsrJ-DvdvkL_OaANJ7M6dcPEwg3cBvI9A7y5U8pg/exec";

const COLORS = [
  "#6366f1","#8b5cf6","#ec4899","#f43f5e","#f97316",
  "#eab308","#22c55e","#14b8a6","#06b6d4","#3b82f6"
];

// --- API helpers (JSONP for GET, form-encoded POST for max compatibility) ---
const apiGet = (key) => new Promise((resolve) => {
  const cb = "cb_" + Date.now();
  const script = document.createElement("script");
  const timeout = setTimeout(() => { delete window[cb]; script.remove(); resolve(null); }, 8000);
  window[cb] = (data) => {
    clearTimeout(timeout); delete window[cb]; script.remove();
    try { resolve(data.value ? JSON.parse(data.value) : null); } catch { resolve(null); }
  };
  script.src = `${API_URL}?callback=${cb}&key=${encodeURIComponent(key)}`;
  script.onerror = () => { clearTimeout(timeout); delete window[cb]; resolve(null); };
  document.head.appendChild(script);
});

const apiSet = async (key, val) => {
  try {
    const body = new URLSearchParams({ action:"set", key, value: JSON.stringify(val) });
    await fetch(API_URL, { method:"POST", body, mode:"no-cors" });
  } catch {}
};

// Local cache fallback
const LC = {
  get: (k, fb) => { try { const v=localStorage.getItem(k); return v?JSON.parse(v):fb; } catch { return fb; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
};

const Avatar = ({ name, size = 28 }) => {
  const colors = ["#6366f1","#8b5cf6","#ec4899","#14b8a6","#f97316"];
  const idx = name.charCodeAt(0) % colors.length;
  return (
    <div style={{ width:size, height:size, borderRadius:"50%", background:colors[idx],
      display:"flex", alignItems:"center", justifyContent:"center",
      fontSize:size*0.45, fontWeight:700, color:"#fff", flexShrink:0 }}>
      {name[0].toUpperCase()}
    </div>
  );
};

const ConfirmDialog = ({ message, onConfirm, onCancel }) => (
  <div style={{ position:"fixed", inset:0, background:"#000a", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000 }}>
    <div style={{ background:"#1e1e2e", border:"1px solid #2d2d3d", borderRadius:14, padding:28, maxWidth:340, width:"90%", textAlign:"center" }}>
      <div style={{ fontSize:15, color:"#e2e8f0", marginBottom:20, lineHeight:1.5 }}>{message}</div>
      <div style={{ display:"flex", gap:10, justifyContent:"center" }}>
        <button onClick={onCancel} style={{ padding:"8px 22px", borderRadius:8, border:"1px solid #2d2d3d", background:"#13131a", color:"#94a3b8", fontWeight:600, fontSize:13, cursor:"pointer" }}>Cancelar</button>
        <button onClick={onConfirm} style={{ padding:"8px 22px", borderRadius:8, border:"none", background:"#ef4444", color:"#fff", fontWeight:600, fontSize:13, cursor:"pointer" }}>Eliminar</button>
      </div>
    </div>
  </div>
);

const EditModal = ({ entry, hashtags, people, onSave, onCancel }) => {
  const [form, setForm] = useState({ title:entry.title, body:entry.body, tags:[...entry.tags], persons:[...entry.persons] });
  const toggleTag = name => setForm(f=>({ ...f, tags: f.tags.includes(name)?f.tags.filter(t=>t!==name):[...f.tags,name] }));
  const togglePerson = name => setForm(f=>({ ...f, persons: f.persons.includes(name)?f.persons.filter(p=>p!==name):[...f.persons,name] }));
  const s = {
    overlay: { position:"fixed", inset:0, background:"#000b", display:"flex", alignItems:"center", justifyContent:"center", zIndex:1000, padding:16 },
    modal: { background:"#13131a", border:"1px solid #2d2d3d", borderRadius:16, padding:24, width:"100%", maxWidth:560, maxHeight:"90vh", overflowY:"auto" },
    input: { width:"100%", background:"#0f0f13", border:"1px solid #2d2d3d", borderRadius:8, padding:"10px 12px", color:"#e2e8f0", fontSize:14, outline:"none", boxSizing:"border-box" },
    textarea: { width:"100%", background:"#0f0f13", border:"1px solid #2d2d3d", borderRadius:8, padding:"10px 12px", color:"#e2e8f0", fontSize:14, outline:"none", resize:"vertical", minHeight:120, boxSizing:"border-box" },
    label: { fontSize:12, color:"#64748b", marginBottom:6, display:"block", fontWeight:600, textTransform:"uppercase", letterSpacing:".05em" },
    sec: { marginBottom:16 },
    tag: (color, act) => ({ display:"inline-flex", alignItems:"center", gap:4, padding:"3px 10px", borderRadius:20, background:act?color:color+"22", color:act?"#fff":color, border:`1px solid ${color}44`, fontSize:12, fontWeight:600, cursor:"pointer", userSelect:"none" }),
  };
  return (
    <div style={s.overlay}>
      <div style={s.modal}>
        <div style={{fontWeight:700,fontSize:16,color:"#a5b4fc",marginBottom:18}}>✏️ Editar entrada</div>
        <div style={s.sec}>
          <label style={s.label}>Título</label>
          <input style={s.input} value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))}/>
        </div>
        <div style={s.sec}>
          <label style={s.label}>Descripción</label>
          <textarea style={s.textarea} value={form.body} onChange={e=>setForm(f=>({...f,body:e.target.value}))}/>
        </div>
        {hashtags.length>0 && <div style={s.sec}>
          <label style={s.label}>Hashtags</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {hashtags.map(h=><span key={h.id} style={s.tag(h.color,form.tags.includes(h.name))} onClick={()=>toggleTag(h.name)}>#{h.name}</span>)}
          </div>
        </div>}
        {people.length>0 && <div style={s.sec}>
          <label style={s.label}>Personas</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {people.map(p=>{
              const sel=form.persons.includes(p.name);
              return <div key={p.id} onClick={()=>togglePerson(p.name)}
                style={{display:"flex",alignItems:"center",gap:6,padding:"4px 10px",borderRadius:20,
                  background:sel?"#6366f133":"#1e1e2e",border:`1px solid ${sel?"#6366f1":"#2d2d3d"}`,cursor:"pointer"}}>
                <Avatar name={p.name} size={20}/>
                <span style={{fontSize:13,color:sel?"#a5b4fc":"#94a3b8"}}>{p.name}</span>
              </div>;
            })}
          </div>
        </div>}
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}>
          <button onClick={onCancel} style={{padding:"8px 18px",borderRadius:8,border:"1px solid #2d2d3d",background:"#0f0f13",color:"#94a3b8",fontWeight:600,fontSize:13,cursor:"pointer"}}>Cancelar</button>
          <button onClick={()=>onSave(form)} style={{padding:"8px 18px",borderRadius:8,border:"none",background:"#6366f1",color:"#fff",fontWeight:600,fontSize:13,cursor:"pointer"}}>Guardar cambios</button>
        </div>
      </div>
    </div>
  );
};

function App() {
  const [entries, setEntries] = useState([]);
  const [hashtags, setHashtags] = useState([]);
  const [people, setPeople] = useState([]);
  const [view, setView] = useState("feed");
  const [loaded, setLoaded] = useState(false);
  const [syncing, setSyncing] = useState(false);
  const [syncStatus, setSyncStatus] = useState("ok"); // ok | saving | error
  const [confirm, setConfirm] = useState(null);
  const [editing, setEditing] = useState(null);

  const [posFilters, setPosFilters] = useState([]);
  const [negFilters, setNegFilters] = useState([]);
  const [posPersons, setPosPersons] = useState([]);
  const [negPersons, setNegPersons] = useState([]);

  const [form, setForm] = useState({ title:"", body:"", tags:[], persons:[] });
  const [newTag, setNewTag] = useState("");
  const [newPerson, setNewPerson] = useState("");
  const [tagColor, setTagColor] = useState(COLORS[0]);

  // Load data: try remote first, fall back to local cache
  useEffect(() => {
    (async () => {
      setSyncing(true);
      try {
        const [e, h, p] = await Promise.all([
          apiGet("entries"), apiGet("hashtags"), apiGet("people")
        ]);
        const entries = e || LC.get("el_entries", []);
        const hashtags = h || LC.get("el_hashtags", []);
        const people = p || LC.get("el_people", []);
        setEntries(entries); setHashtags(hashtags); setPeople(people);
        LC.set("el_entries", entries); LC.set("el_hashtags", hashtags); LC.set("el_people", people);
      } catch {
        setEntries(LC.get("el_entries",[]));
        setHashtags(LC.get("el_hashtags",[]));
        setPeople(LC.get("el_people",[]));
        setSyncStatus("error");
      }
      setSyncing(false);
      setLoaded(true);
    })();
  }, []);

  const persist = async (key, val) => {
    LC.set(`el_${key}`, val);
    setSyncStatus("saving");
    await apiSet(key, val);
    setSyncStatus("ok");
  };

  const saveEntries = v => { setEntries(v); persist("entries", v); };
  const saveHashtags = v => { setHashtags(v); persist("hashtags", v); };
  const savePeople = v => { setPeople(v); persist("people", v); };

  const askConfirm = (message, onConfirm) => setConfirm({ message, onConfirm });
  const doConfirm = () => { confirm?.onConfirm(); setConfirm(null); };

  const addEntry = () => {
    if (!form.title.trim() && !form.body.trim()) return;
    saveEntries([{ id:Date.now(), title:form.title, body:form.body,
      tags:form.tags, persons:form.persons, date:new Date().toISOString(), archived:false }, ...entries]);
    setForm({ title:"", body:"", tags:[], persons:[] });
    setView("feed");
  };

  const saveEdit = f => { saveEntries(entries.map(e => e.id===editing.id ? {...e,...f} : e)); setEditing(null); };
  const toggleArchive = id => saveEntries(entries.map(e => e.id===id ? {...e, archived:!e.archived} : e));

  const addHashtag = () => {
    const name = newTag.trim().replace(/^#/,"");
    if (!name || hashtags.find(h=>h.name===name)) return;
    saveHashtags([...hashtags, { name, color:tagColor, id:Date.now() }]);
    setNewTag("");
  };

  const addPerson = () => {
    const name = newPerson.trim();
    if (!name || people.find(p=>p.name===name)) return;
    savePeople([...people, { name, id:Date.now() }]);
    setNewPerson("");
  };

  const toggleFormTag = name => setForm(f=>({ ...f, tags: f.tags.includes(name)?f.tags.filter(t=>t!==name):[...f.tags,name] }));
  const toggleFormPerson = name => setForm(f=>({ ...f, persons: f.persons.includes(name)?f.persons.filter(p=>p!==name):[...f.persons,name] }));

  const toggleTagFilter = (tag, mode) => {
    if (mode==="pos") { setNegFilters(n=>n.filter(t=>t!==tag)); setPosFilters(p=>p.includes(tag)?p.filter(t=>t!==tag):[...p,tag]); }
    else { setPosFilters(p=>p.filter(t=>t!==tag)); setNegFilters(n=>n.includes(tag)?n.filter(t=>t!==tag):[...n,tag]); }
  };
  const togglePersonFilter = (name, mode) => {
    if (mode==="pos") { setNegPersons(n=>n.filter(p=>p!==name)); setPosPersons(p=>p.includes(name)?p.filter(x=>x!==name):[...p,name]); }
    else { setPosPersons(p=>p.filter(x=>x!==name)); setNegPersons(n=>n.includes(name)?n.filter(p=>p!==name):[...n,name]); }
  };

  const active = entries.filter(e=>!e.archived);
  const archived = entries.filter(e=>e.archived);
  const applyFilters = list => list.filter(e => {
    if (posFilters.length && !posFilters.every(t=>e.tags.includes(t))) return false;
    if (negFilters.some(t=>e.tags.includes(t))) return false;
    if (posPersons.length && !posPersons.every(p=>e.persons.includes(p))) return false;
    if (negPersons.some(p=>e.persons.includes(p))) return false;
    return true;
  });
  const filtered = applyFilters(active);
  const filteredArchived = applyFilters(archived);
  const hasFilters = posFilters.length||negFilters.length||posPersons.length||negPersons.length;
  const clearFilters = () => { setPosFilters([]); setNegFilters([]); setPosPersons([]); setNegPersons([]); };

  const tagStats = hashtags.map(h=>({ ...h, count:entries.filter(e=>e.tags.includes(h.name)).length })).sort((a,b)=>b.count-a.count);
  const personStats = people.map(p=>({ ...p, count:entries.filter(e=>e.persons.includes(p.name)).length })).sort((a,b)=>b.count-a.count);

  const s = {
    app: { minHeight:"100vh", background:"#0f0f13", color:"#e2e8f0", fontFamily:"system-ui,sans-serif", display:"flex", flexDirection:"column" },
    header: { padding:"16px 20px", borderBottom:"1px solid #1e1e2e", display:"flex", alignItems:"center", justifyContent:"space-between", background:"#13131a", gap:12 },
    navBtn: a => ({ padding:"6px 14px", borderRadius:8, border:"none", cursor:"pointer", fontSize:13, fontWeight:600, background:a?"#6366f1":"#1e1e2e", color:a?"#fff":"#94a3b8" }),
    main: { flex:1, padding:"20px", maxWidth:760, width:"100%", margin:"0 auto" },
    card: faded => ({ background:faded?"#0f0f13":"#13131a", border:"1px solid #1e1e2e", borderRadius:12, padding:16, marginBottom:12, opacity:faded?0.7:1 }),
    input: { width:"100%", background:"#0f0f13", border:"1px solid #2d2d3d", borderRadius:8, padding:"10px 12px", color:"#e2e8f0", fontSize:14, outline:"none", boxSizing:"border-box" },
    textarea: { width:"100%", background:"#0f0f13", border:"1px solid #2d2d3d", borderRadius:8, padding:"10px 12px", color:"#e2e8f0", fontSize:14, outline:"none", resize:"vertical", minHeight:120, boxSizing:"border-box" },
    btn: (bg="#6366f1") => ({ padding:"8px 18px", borderRadius:8, border:"none", background:bg, color:"#fff", fontWeight:600, fontSize:13, cursor:"pointer" }),
    tag: (color, act) => ({ display:"inline-flex", alignItems:"center", gap:4, padding:"3px 10px", borderRadius:20, background:act?color:color+"22", color:act?"#fff":color, border:`1px solid ${color}44`, fontSize:12, fontWeight:600, cursor:"pointer", userSelect:"none" }),
    negTag: () => ({ display:"inline-flex", alignItems:"center", gap:4, padding:"3px 10px", borderRadius:20, background:"#ef444422", color:"#ef4444", border:"1px solid #ef444444", fontSize:12, fontWeight:600, cursor:"pointer", userSelect:"none" }),
    personChip: state => ({ display:"flex", alignItems:"center", gap:6, padding:"4px 10px", borderRadius:20, cursor:"pointer", userSelect:"none",
      background:state==="pos"?"#6366f133":state==="neg"?"#ef444422":"#1e1e2e",
      border:`1px solid ${state==="pos"?"#6366f1":state==="neg"?"#ef4444":"#2d2d3d"}` }),
    label: { fontSize:12, color:"#64748b", marginBottom:6, display:"block", fontWeight:600, textTransform:"uppercase", letterSpacing:".05em" },
    sec: { marginBottom:20 },
    delBtn: { background:"none", border:"none", color:"#475569", cursor:"pointer", fontSize:15, padding:"0 2px", lineHeight:1 },
    iconBtn: color => ({ background:"none", border:"none", color:color||"#475569", cursor:"pointer", fontSize:14, padding:"2px 5px", lineHeight:1, borderRadius:4 }),
    sectionTitle: { fontWeight:700, fontSize:14, color:"#64748b", margin:"20px 0 10px", display:"flex", alignItems:"center", gap:8 },
  };

  const SyncBadge = () => {
    const cfg = {
      saving: { color:"#eab308", label:"Guardando..." },
      error:  { color:"#ef4444", label:"Sin conexión (datos locales)" },
      ok:     { color:"#22c55e", label:"Sincronizado" },
    }[syncStatus];
    return (
      <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:cfg.color}}>
        <div style={{width:7,height:7,borderRadius:"50%",background:cfg.color}}/>
        {cfg.label}
      </div>
    );
  };

  const EntryCard = ({ e, isArchived }) => (
    <div style={s.card(isArchived)}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
        <div>
          {e.title&&<div style={{fontWeight:700,fontSize:15,color:isArchived?"#64748b":"#f1f5f9",marginBottom:2}}>{e.title}</div>}
          <div style={{fontSize:11,color:"#475569"}}>{new Date(e.date).toLocaleString("es-ES")}</div>
        </div>
        <div style={{display:"flex",gap:2,alignItems:"center"}}>
          <button style={s.iconBtn("#6366f1")} title="Editar" onClick={()=>setEditing(e)}>✏️</button>
          <button style={s.iconBtn(isArchived?"#22c55e":"#94a3b8")} title={isArchived?"Desarchivar":"Archivar"} onClick={()=>toggleArchive(e.id)}>
            {isArchived?"↩":"🗄"}
          </button>
          <button style={s.delBtn} onClick={()=>askConfirm("¿Eliminar esta entrada?",()=>saveEntries(entries.filter(x=>x.id!==e.id)))}>×</button>
        </div>
      </div>
      {e.body&&<div style={{fontSize:14,color:isArchived?"#475569":"#cbd5e1",lineHeight:1.6,marginBottom:10,whiteSpace:"pre-wrap"}}>{e.body}</div>}
      <div style={{display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}>
        {e.tags.map(t=>{ const h=hashtags.find(h=>h.name===t); return <span key={t} style={s.tag(h?.color||"#6366f1",false)}>#{t}</span>; })}
        {e.persons.map(p=>(
          <div key={p} style={{display:"flex",alignItems:"center",gap:4}}>
            <Avatar name={p} size={20}/>
            <span style={{fontSize:12,color:"#94a3b8"}}>{p}</span>
          </div>
        ))}
      </div>
    </div>
  );

  if (!loaded) return (
    <div style={{...s.app,alignItems:"center",justifyContent:"center",gap:12}}>
      <div style={{color:"#6366f1",fontSize:18}}>⚡ EventLog</div>
      <div style={{color:"#475569",fontSize:13}}>Conectando con Google Drive...</div>
    </div>
  );

  return (
    <div style={s.app}>
      {confirm && <ConfirmDialog message={confirm.message} onConfirm={doConfirm} onCancel={()=>setConfirm(null)}/>}
      {editing && <EditModal entry={editing} hashtags={hashtags} people={people} onSave={saveEdit} onCancel={()=>setEditing(null)}/>}

      <div style={s.header}>
        <div style={{fontWeight:800,fontSize:17,color:"#a5b4fc"}}>⚡ EventLog</div>
        <nav style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {[["feed","📋 Feed"],["add","➕ Nueva"],["manage","⚙️ Gestionar"],["stats","📊 Stats"]].map(([v,l])=>(
            <button key={v} style={s.navBtn(view===v)} onClick={()=>setView(v)}>{l}</button>
          ))}
        </nav>
        <SyncBadge/>
      </div>

      <div style={s.main}>
        {view==="feed" && <>
          {(hashtags.length>0||people.length>0) && (
            <div style={s.card(false)}>
              <div style={{fontSize:11,color:"#475569",marginBottom:10}}>💡 <b>Clic</b> = incluir &nbsp;|&nbsp; <b>Doble clic</b> = excluir</div>
              {hashtags.length>0 && <div style={s.sec}>
                <span style={s.label}>Hashtags</span>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {hashtags.map(h=>{
                    const isPos=posFilters.includes(h.name), isNeg=negFilters.includes(h.name);
                    return <span key={h.id} style={isNeg?s.negTag():s.tag(h.color,isPos)}
                      onClick={()=>toggleTagFilter(h.name,"pos")}
                      onDoubleClick={e=>{e.stopPropagation();toggleTagFilter(h.name,"neg");}}>
                      {isNeg?"–#":"#"}{h.name}</span>;
                  })}
                </div>
              </div>}
              {people.length>0 && <div style={s.sec}>
                <span style={s.label}>Personas</span>
                <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                  {people.map(p=>{
                    const isPos=posPersons.includes(p.name), isNeg=negPersons.includes(p.name);
                    return <div key={p.id} style={s.personChip(isPos?"pos":isNeg?"neg":"none")}
                      onClick={()=>togglePersonFilter(p.name,"pos")}
                      onDoubleClick={e=>{e.stopPropagation();togglePersonFilter(p.name,"neg");}}>
                      <Avatar name={p.name} size={20}/>
                      <span style={{fontSize:13,color:isPos?"#a5b4fc":isNeg?"#ef4444":"#cbd5e1"}}>{isNeg?"–":""}{p.name}</span>
                    </div>;
                  })}
                </div>
              </div>}
              {hasFilters && <button style={{...s.btn("#374151"),fontSize:12,padding:"4px 12px"}} onClick={clearFilters}>Limpiar filtros</button>}
            </div>
          )}
          <div style={{fontSize:13,color:"#475569",marginBottom:12}}>
            {filtered.length} entrada{filtered.length!==1?"s":""}{active.length!==filtered.length?` (de ${active.length})`:""}
          </div>
          {filtered.length===0 && <div style={{textAlign:"center",padding:"40px 0",color:"#475569"}}>
            {active.length===0?"No hay entradas aún. ¡Crea la primera!":"Sin resultados con los filtros actuales."}
          </div>}
          {filtered.map(e=><EntryCard key={e.id} e={e} isArchived={false}/>)}
          {archived.length>0 && <>
            <div style={s.sectionTitle}>
              <span>🗄 Archivadas</span>
              <span style={{fontSize:12,background:"#1e1e2e",padding:"2px 8px",borderRadius:10,color:"#64748b"}}>{filteredArchived.length}</span>
            </div>
            {filteredArchived.map(e=><EntryCard key={e.id} e={e} isArchived={true}/>)}
          </>}
        </>}

        {view==="add" && <div style={s.card(false)}>
          <div style={{fontWeight:700,fontSize:16,marginBottom:16,color:"#a5b4fc"}}>Nueva entrada</div>
          <div style={s.sec}>
            <label style={s.label}>Título (opcional)</label>
            <input style={s.input} placeholder="Título breve..." value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))}/>
          </div>
          <div style={s.sec}>
            <label style={s.label}>Descripción</label>
            <textarea style={s.textarea} placeholder="Escribe aquí el detalle..." value={form.body} onChange={e=>setForm(f=>({...f,body:e.target.value}))}/>
          </div>
          {hashtags.length>0 && <div style={s.sec}>
            <label style={s.label}>Hashtags</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {hashtags.map(h=><span key={h.id} style={s.tag(h.color,form.tags.includes(h.name))} onClick={()=>toggleFormTag(h.name)}>#{h.name}</span>)}
            </div>
          </div>}
          {people.length>0 && <div style={s.sec}>
            <label style={s.label}>Personas</label>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {people.map(p=>{
                const sel=form.persons.includes(p.name);
                return <div key={p.id} onClick={()=>toggleFormPerson(p.name)}
                  style={{display:"flex",alignItems:"center",gap:6,padding:"4px 10px",borderRadius:20,
                    background:sel?"#6366f133":"#1e1e2e",border:`1px solid ${sel?"#6366f1":"#2d2d3d"}`,cursor:"pointer"}}>
                  <Avatar name={p.name} size={22}/>
                  <span style={{fontSize:13,color:sel?"#a5b4fc":"#94a3b8"}}>{p.name}</span>
                </div>;
              })}
            </div>
          </div>}
          {hashtags.length===0&&<div style={{fontSize:13,color:"#475569",marginBottom:12}}>💡 Añade hashtags en "Gestionar" para poder etiquetar entradas.</div>}
          <button style={s.btn()} onClick={addEntry}>Guardar entrada</button>
        </div>}

        {view==="manage" && <>
          <div style={s.card(false)}>
            <div style={{fontWeight:700,fontSize:15,color:"#a5b4fc",marginBottom:14}}>🏷️ Hashtags</div>
            <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
              <input style={{...s.input,width:"auto",flex:1}} placeholder="#nuevo-hashtag" value={newTag}
                onChange={e=>setNewTag(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addHashtag()}/>
              <div style={{display:"flex",gap:4}}>
                {COLORS.map(c=><div key={c} onClick={()=>setTagColor(c)} style={{width:18,height:18,borderRadius:"50%",background:c,cursor:"pointer",border:tagColor===c?"2px solid #fff":"2px solid transparent"}}/>)}
              </div>
              <button style={s.btn()} onClick={addHashtag}>Añadir</button>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {hashtags.map(h=><span key={h.id} style={{...s.tag(h.color,false),gap:6}}>
                #{h.name}
                <button style={{...s.delBtn,color:h.color,opacity:.7}}
                  onClick={()=>askConfirm(`¿Eliminar el hashtag #${h.name}?`,()=>saveHashtags(hashtags.filter(x=>x.id!==h.id)))}>×</button>
              </span>)}
              {hashtags.length===0&&<span style={{color:"#475569",fontSize:13}}>Sin hashtags aún.</span>}
            </div>
          </div>
          <div style={s.card(false)}>
            <div style={{fontWeight:700,fontSize:15,color:"#a5b4fc",marginBottom:14}}>👥 Personas</div>
            <div style={{display:"flex",gap:8,marginBottom:12}}>
              <input style={{...s.input,flex:1}} placeholder="Nombre..." value={newPerson}
                onChange={e=>setNewPerson(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addPerson()}/>
              <button style={s.btn()} onClick={addPerson}>Añadir</button>
            </div>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {people.map(p=><div key={p.id} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 12px",borderRadius:20,background:"#1e1e2e",border:"1px solid #2d2d3d"}}>
                <Avatar name={p.name} size={22}/>
                <span style={{fontSize:13,color:"#cbd5e1"}}>{p.name}</span>
                <button style={s.delBtn} onClick={()=>askConfirm(`¿Eliminar a ${p.name}?`,()=>savePeople(people.filter(x=>x.id!==p.id)))}>×</button>
              </div>)}
              {people.length===0&&<span style={{color:"#475569",fontSize:13}}>Sin personas aún.</span>}
            </div>
          </div>
        </>}

        {view==="stats" && <>
          <div style={s.card(false)}>
            <div style={{fontWeight:700,fontSize:15,color:"#a5b4fc",marginBottom:14}}>📊 Hashtags más usados</div>
            {tagStats.filter(t=>t.count>0).length===0&&<div style={{color:"#475569",fontSize:13}}>Sin datos aún.</div>}
            {tagStats.filter(t=>t.count>0).map(h=>{
              const max=tagStats[0]?.count||1;
              return <div key={h.id} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{color:h.color,fontWeight:600,fontSize:13}}>#{h.name}</span>
                  <span style={{color:"#64748b",fontSize:13}}>{h.count}</span>
                </div>
                <div style={{background:"#1e1e2e",borderRadius:4,height:6}}>
                  <div style={{background:h.color,height:6,borderRadius:4,width:`${(h.count/max)*100}%`}}/>
                </div>
              </div>;
            })}
          </div>
          <div style={s.card(false)}>
            <div style={{fontWeight:700,fontSize:15,color:"#a5b4fc",marginBottom:14}}>👥 Personas más frecuentes</div>
            {personStats.filter(p=>p.count>0).length===0&&<div style={{color:"#475569",fontSize:13}}>Sin datos aún.</div>}
            {personStats.filter(p=>p.count>0).map(p=>{
              const max=personStats[0]?.count||1;
              return <div key={p.id} style={{marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                  <Avatar name={p.name} size={22}/>
                  <span style={{color:"#cbd5e1",fontSize:13,flex:1}}>{p.name}</span>
                  <span style={{color:"#64748b",fontSize:13}}>{p.count}</span>
                </div>
                <div style={{background:"#1e1e2e",borderRadius:4,height:6}}>
                  <div style={{background:"#6366f1",height:6,borderRadius:4,width:`${(p.count/max)*100}%`}}/>
                </div>
              </div>;
            })}
          </div>
          <div style={s.card(false)}>
            <div style={{fontWeight:700,fontSize:15,color:"#a5b4fc",marginBottom:8}}>📈 Resumen</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12}}>
              {[["Entradas",active.length,"#6366f1"],["Archivadas",archived.length,"#475569"],["Hashtags",hashtags.length,"#8b5cf6"],["Personas",people.length,"#14b8a6"]].map(([l,v,c])=>(
                <div key={l} style={{background:"#0f0f13",borderRadius:10,padding:14,textAlign:"center",border:`1px solid ${c}33`}}>
                  <div style={{fontSize:24,fontWeight:800,color:c}}>{v}</div>
                  <div style={{fontSize:11,color:"#64748b",marginTop:2}}>{l}</div>
                </div>
              ))}
            </div>
          </div>
        </>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
